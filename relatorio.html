<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relatório Mensal</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    /* ===== TOPO DO RELATÓRIO ===== */
    .topo-relatorio {
      background: #0b5aa2;
      color: #fff;
      padding: 14px;
      display: grid;
      grid-template-columns: 40px 1fr;
      align-items: center;
      gap: 12px;
    }

    .btnVoltar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      background: #ffffff;
      color: #0b5aa2;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;

      display: flex;
      align-items: center;
      justify-content: center;

      box-shadow: 0 6px 14px rgba(0, 0, 0, .25);
      transition: transform .1s ease, box-shadow .1s ease;
    }

    .btnVoltar:active {
      transform: translateY(2px);
      box-shadow:
        inset 0 3px 6px rgba(0, 0, 0, .25),
        0 2px 6px rgba(0, 0, 0, .15);
    }
  </style>
</head>

<body style="margin:0;font-family:Arial;background:#eef1f4;color:#1f2937;font-size:13px;">

  <!-- TOPO COM VOLTAR -->
  <div class="topo-relatorio">
    <button class="btnVoltar" onclick="window.location.href='index.html'">←</button>

    <div>
      <h2 style="margin:0;font-size:16px;">PROICE CLIMATIZAÇÃO</h2>
      <div id="mesRelatorio" style="font-size:12px;opacity:.9;"></div>
    </div>
  </div>

  <!-- BOTÃO PDF -->
  <div style="text-align:center;margin:14px;">
    <button id="btnPdf" style="
      padding:12px 26px;
      border-radius:20px;
      border:none;
      background:#1e88e5;
      color:#fff;
      font-size:14px;
      cursor:pointer;
    ">
      📄 Visualizar / Compartilhar PDF
    </button>
  </div>

  <!-- TABELA -->
  <div style="
    max-width:600px;
    margin:14px auto;
    background:#fff;
    border-radius:10px;
    overflow:hidden;
    border:1px solid #9ca3af;
  ">

    <!-- CABEÇALHO TABELA -->
    <div style="
      display:grid;
      grid-template-columns:1.4fr 2fr 1fr 32px;
      background:#e5e7eb;
      font-weight:bold;
      font-size:12px;
      text-align:center;
      border-bottom:2px solid #9ca3af;
    ">
      <div style="padding:10px;border-right:1px solid #9ca3af;">Data / Hora</div>
      <div style="padding:10px;border-right:1px solid #9ca3af;">Descrição</div>
      <div style="padding:10px;border-right:1px solid #9ca3af;">Valor</div>
      <div></div>
    </div>

    <div id="lista"></div>

    <!-- TOTAL -->
    <div style="
      display:grid;
      grid-template-columns:1.4fr 2fr 1fr 32px;
      background:#f3f4f6;
      font-weight:bold;
      border-top:2px solid #9ca3af;
    ">
      <div style="
        grid-column:1/3;
        padding:12px;
        text-align:center;
        border-right:1px solid #9ca3af;
      ">
        TOTAL
      </div>
      <div id="total" style="padding:12px;text-align:center;">R$ 0,00</div>
      <div></div>
    </div>
  </div>

  <script>
    const lista = document.getElementById("lista");
    const totalEl = document.getElementById("total");
    const mesEl = document.getElementById("mesRelatorio");
    const btnPdf = document.getElementById("btnPdf");

    function getMesAnoAtual() {
      const meses = [
        "Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho",
        "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"
      ];
      const hoje = new Date();
      return `${meses[hoje.getMonth()]} / ${hoje.getFullYear()}`;
    }

    mesEl.innerText = `Relatório Mensal — ${getMesAnoAtual()}`;

    let dados = JSON.parse(localStorage.getItem("relatorioMensal")) || [];

    function renderizar() {
      lista.innerHTML = "";
      let total = 0;

      dados.forEach((g, index) => {
        total += g.valor;

        const linha = document.createElement("div");
        linha.style.display = "grid";
        linha.style.gridTemplateColumns = "1.4fr 2fr 1fr 32px";
        linha.style.borderBottom = "1px solid #e5e7eb";

        linha.innerHTML = `
          <div style="padding:10px;text-align:center;border-right:1px solid #e5e7eb;">
            ${g.data} ${g.hora}
          </div>
          <div style="padding:10px;text-align:center;border-right:1px solid #e5e7eb;">
            ${g.descricao}
          </div>
          <div style="padding:10px;text-align:center;border-right:1px solid #e5e7eb;">
            R$ ${g.valor.toLocaleString("pt-BR", { minimumFractionDigits: 2 })}
          </div>
          <div style="display:flex;align-items:center;justify-content:center;">
            <span style="cursor:pointer;opacity:.5;">🗑️</span>
          </div>
        `;

        linha.querySelector("span").onclick = () => {
          if (confirm("Excluir este lançamento?")) {
            dados.splice(index, 1);
            localStorage.setItem("relatorioMensal", JSON.stringify(dados));
            renderizar();
          }
        };

        lista.appendChild(linha);
      });

      totalEl.innerText =
        "R$ " + total.toLocaleString("pt-BR", { minimumFractionDigits: 2 });
    }

    renderizar();

    // ===== PDF + COMPARTILHAMENTO =====
    btnPdf.onclick = async () => {
      if (dados.length === 0) {
        alert("Não há dados para gerar PDF.");
        return;
      }

      const { jsPDF } = window.jspdf;
      const doc = new jsPDF("p", "mm", "a4");

      doc.setFillColor(11, 90, 162);
      doc.rect(0, 0, 210, 24, "F");
      doc.setTextColor(255);
      doc.setFontSize(13);
      doc.text("PROICE CLIMATIZAÇÃO", 105, 14, { align: "center" });
      doc.setFontSize(9);
      doc.text(`Relatório Mensal — ${getMesAnoAtual()}`, 105, 20, { align: "center" });

      let y = 32;
      const colX = [14, 70, 150, 196];
      const rowH = 8;

      doc.setFontSize(8);
      doc.setTextColor(0);

      doc.rect(colX[0], y, colX[3] - colX[0], rowH);
      doc.line(colX[1], y, colX[1], y + rowH);
      doc.line(colX[2], y, colX[2], y + rowH);

      doc.text("Data / Hora", (colX[0] + colX[1]) / 2, y + 5, { align: "center" });
      doc.text("Descrição", (colX[1] + colX[2]) / 2, y + 5, { align: "center" });
      doc.text("Valor", (colX[2] + colX[3]) / 2, y + 5, { align: "center" });

      y += rowH;
      let soma = 0;

      dados.forEach(g => {
        doc.rect(colX[0], y, colX[3] - colX[0], rowH);
        doc.line(colX[1], y, colX[1], y + rowH);
        doc.line(colX[2], y, colX[2], y + rowH);

        doc.text(`${g.data} ${g.hora}`, (colX[0] + colX[1]) / 2, y + 5, { align: "center" });
        doc.text(g.descricao, (colX[1] + colX[2]) / 2, y + 5, { align: "center" });
        doc.text(
          "R$ " + g.valor.toLocaleString("pt-BR", { minimumFractionDigits: 2 }),
          (colX[2] + colX[3]) / 2,
          y + 5,
          { align: "center" }
        );

        soma += g.valor;
        y += rowH;
      });

      doc.line(colX[0], y, colX[3], y);
      doc.setFontSize(9);
      doc.text("TOTAL:", colX[2] - 4, y + 6, { align: "right" });
      doc.text(
        "R$ " + soma.toLocaleString("pt-BR", { minimumFractionDigits: 2 }),
        colX[3],
        y + 6,
        { align: "right" }
      );

      if (navigator.canShare) {
        const blob = doc.output("blob");
        const file = new File(
          [blob],
          `proice-relatorio-${getMesAnoAtual().replace(" / ", "-")}.pdf`,
          { type: "application/pdf" }
        );

        if (navigator.canShare({ files: [file] })) {
          await navigator.share({
            files: [file],
            title: "Relatório Mensal",
            text: "Relatório mensal - Proice Climatização"
          });
          return;
        }
      }

      doc.save(`proice-relatorio-${getMesAnoAtual().replace(" / ", "-")}.pdf`);
    };
  </script>

</body>

</html>
