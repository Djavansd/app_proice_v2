<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relatorio Mensal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=8">
  <script>
    (function aplicarTemaSalvo() {
      const tema = localStorage.getItem("tema");
      document.addEventListener("DOMContentLoaded", () => {
        if (tema === "claro" || tema === "escuro") {
          document.body.classList.remove("claro", "escuro");
          document.body.classList.add(tema);
        } else {
          document.body.classList.add("escuro");
        }
      });
    })();
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body class="escuro">
  <div class="topo-relatorio">
    <button class="btnVoltar" onclick="window.location.href='index.html'"><</button>
    <div>
      <h2 style="font-size:16px;">PROICE CLIMATIZACAO</h2>
      <div id="mesRelatorio" style="font-size:12px;opacity:.9;"></div>
    </div>
  </div>

  <div class="relatorio-actions">
    <button id="btnPdf">Visualizar / Compartilhar PDF</button>
  </div>

  <div class="relatorio-card">
    <div class="relatorio-header">
      <div>Data / Hora</div>
      <div>Descricao</div>
      <div>Valor</div>
      <div></div>
    </div>

    <div id="lista"></div>

    <div class="relatorio-total">
      <div style="grid-column:1/3;">TOTAL</div>
      <div id="total">R$ 0,00</div>
      <div></div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js?v=8"></script>
  <script src="firebase-financeiro.js?v=8"></script>
  <script src="relatorio.js?v=8"></script>
</body>

</html>
