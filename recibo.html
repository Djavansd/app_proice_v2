<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recibo | Proice</title>
  <meta name="theme-color" content="#0f3a66" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=7">
  <script>
    (function aplicarTemaSalvo() {
      const tema = localStorage.getItem("tema");
      document.addEventListener("DOMContentLoaded", () => {
        if (tema === "claro" || tema === "escuro") {
          document.body.classList.remove("claro", "escuro");
          document.body.classList.add(tema);
        } else {
          document.body.classList.add("escuro");
        }
      });
    })();
  </script>
</head>

<body class="escuro">
  <div class="recibo" id="reciboArea">
    <h1 style="text-align:center;color:#0b3c6f;">RECIBO DE PAGAMENTO</h1>
    <div class="linha"></div>

    <div class="secao">
      <strong>DADOS DO CONTRATANTE</strong>
      <p><b>Cliente:</b> <span id="rCliente"></span></p>
      <p><b>CPF/CNPJ:</b> <span id="rDoc"></span></p>
      <p><b>Endereco:</b> <span id="rEndereco"></span></p>
      <p><b>Telefone:</b> <span id="rTelefone"></span></p>
    </div>

    <div class="linha"></div>

    <div class="secao">
      <p><b>Data:</b> <span id="rData"></span></p>
      <p><b>Forma de pagamento:</b> <span id="rPagamento"></span></p>
    </div>

    <div class="secao">
      <strong>DESCRICAO DOS SERVICOS PRESTADOS</strong>
      <table>
        <thead>
          <tr>
            <th>Descricao</th>
            <th>Qtd</th>
            <th>Valor</th>
            <th>Subtotal</th>
          </tr>
        </thead>
        <tbody id="tabelaItens"></tbody>
      </table>
    </div>

    <div class="total">Valor recebido: <span id="rTotal"></span></div>

    <div class="secao">
      <strong>Observacoes</strong>
      <div class="observacao" id="rObs"></div>
    </div>

    <div class="rodape">
      <b>Proice Climatizacao</b><br>
      CNPJ: 42.937.499/0001-08<br>
      Sao Paulo - SP
    </div>

    <div class="acoes">
      <button onclick="baixarPDF()">Imprimir recibo</button>
    </div>
  </div>

  <script>
    const dados = JSON.parse(sessionStorage.getItem("reciboProice") || localStorage.getItem("reciboProice"));

    if (!dados) {
      alert("Nenhum recibo encontrado.");
    } else {
      rCliente.textContent = dados.nome || "---";
      rDoc.textContent = dados.doc || "---";
      rEndereco.textContent = dados.endereco || "---";
      rTelefone.textContent = dados.telefone || "---";
      rPagamento.textContent = dados.pagamento || "---";
      rTotal.textContent = dados.total || "---";
      rData.textContent = new Date().toLocaleDateString("pt-BR");
      rObs.textContent = dados.observacao?.trim() || "-";

      const tbody = document.getElementById("tabelaItens");
      tbody.innerHTML = "";

      dados.itens.forEach(item => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${item.descricao}</td>
          <td>${item.qtd}</td>
          <td>${item.valor}</td>
          <td>${item.subtotal}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    function baixarPDF() {
      window.print();
    }
  </script>
</body>

</html>
