<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atualizando App...</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #071a2e;
      color: #eaf2ff;
      font-family: "Segoe UI", Arial, sans-serif;
      text-align: center;
      padding: 20px;
    }

    .box {
      max-width: 420px;
      border: 1px solid rgba(140, 180, 220, 0.35);
      border-radius: 14px;
      background: rgba(10, 34, 58, 0.86);
      padding: 18px;
    }
  </style>
</head>

<body>
  <div class="box">
    <h2 style="margin:0 0 10px">Atualizando o app...</h2>
    <p id="msg" style="margin:0;opacity:.9">Aguarde alguns segundos.</p>
  </div>

  <script>
    (async function atualizarPwa() {
      const msg = document.getElementById("msg");
      try {
        if ("serviceWorker" in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map((r) => r.unregister()));
        }

        if (window.caches && caches.keys) {
          const keys = await caches.keys();
          await Promise.all(keys.map((k) => caches.delete(k)));
        }

        msg.textContent = "Atualizacao concluida. Abrindo o app...";
      } catch {
        msg.textContent = "Atualizacao aplicada. Abrindo o app...";
      }

      setTimeout(() => {
        window.location.replace("./index.html?v=7");
      }, 900);
    })();
  </script>
</body>

</html>
