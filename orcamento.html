<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orcamento | Proice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="manifest" href="/manifest.json?v=7">
  <meta name="theme-color" content="#0f3a66">
  <link rel="stylesheet" href="styles.css?v=7">
  <script>
    (function aplicarTemaSalvo() {
      const tema = localStorage.getItem("tema");
      document.addEventListener("DOMContentLoaded", () => {
        if (tema === "claro" || tema === "escuro") {
          document.body.classList.remove("claro", "escuro");
          document.body.classList.add(tema);
        } else {
          document.body.classList.add("escuro");
        }
      });
    })();
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body class="escuro">
  <div class="menu">
    <button onclick="location.href='index.html'"><</button>

    <div class="acoes-wrapper">
      <button id="btnAcoes">Acoes</button>
      <div id="menuAcoes" class="menu-acoes">
        <button id="btnNovo">Novo</button>
        <button id="btnCliente">Cliente</button>
        <button id="btnClientesSalvos">Clientes cadastrados</button>
        <button id="btnItens">Adicionar item</button>
        <button id="btnPagamento">Forma de pagamento</button>
      </div>
    </div>
  </div>

  <div id="overlayCliente" class="overlay">
    <div class="modal">
      <h3>Cliente</h3>
      <input id="cliNome" placeholder="Nome / Razao social">
      <input id="cliDoc" placeholder="CPF ou CNPJ">
      <input id="cliEndereco" placeholder="Endereco">
      <input id="cliTelefone" placeholder="Telefone">
      <button class="btn" id="btnConfirmarCliente">Confirmar cliente</button>
    </div>
  </div>

  <div id="overlayClientesSalvos" class="overlay">
    <div class="modal">
      <h3>Clientes cadastrados</h3>
      <div id="listaClientes"></div>
    </div>
  </div>

  <div id="overlayItens" class="overlay">
    <div class="modal">
      <h3>Item</h3>
      <input id="desc" list="listaDescricoes" placeholder="Descricao">
      <datalist id="listaDescricoes"></datalist>
      <input id="qtd" type="number" placeholder="Quantidade">
      <input id="valor" type="number" placeholder="Valor unitario">
      <button class="btn" id="btnAddItem">Adicionar item</button>
    </div>
  </div>

  <div id="overlayPagamento" class="overlay">
    <div class="modal">
      <h3>Forma de pagamento</h3>
      <button class="btn" data-pg="PIX">PIX</button>
      <button class="btn" data-pg="Debito">Debito</button>
      <button class="btn" data-pg="Credito">Credito</button>
      <button class="btn" data-pg="Boleto">Boleto</button>
    </div>
  </div>

  <div class="card">
    <div class="cabecalho-texto">
      <strong>PROICE CLIMATIZACAO</strong>
      <small>CNPJ: 42.937.499/0001-08</small><br>
      <input id="empresaContato" placeholder="WhatsApp / Telefone da empresa" style="margin-top:8px;max-width:280px;">
    </div>

    <strong>CLIENTE:</strong> <span id="vNome">---</span><br>
    <strong>CPF/CNPJ:</strong> <span id="vDoc">---</span><br>
    <strong>ENDERECO:</strong> <span id="vEndereco">---</span><br>
    <strong>TELEFONE:</strong> <span id="vTelefone">---</span><br>
    <strong>PAGAMENTO:</strong> <span id="vPagamento">---</span>

    <table>
      <thead>
        <tr>
          <th>DESCRICAO</th>
          <th>QTD</th>
          <th>VALOR</th>
          <th>SUBTOTAL</th>
        </tr>
      </thead>
      <tbody id="itens"></tbody>
    </table>

    <div class="total">TOTAL: <span id="total">R$ 0,00</span></div>
    <button class="btnPdfFinal" onclick="prepararPDF()">Visualizar / Imprimir PDF</button>
    <button class="btnPdfFinal" style="background:linear-gradient(120deg,#22c55e,#15803d);margin-top:8px"
      onclick="gerarRecibo()">Gerar recibo</button>

    <div style="margin-top:14px;">
      <strong>Observacoes:</strong>
      <textarea id="obsPDF" placeholder="Digite observacoes, prazo, garantia e condicoes..."
        style="height:90px;margin-top:6px;resize:none;"></textarea>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const CHAVE_ORCAMENTO_ATUAL = "orcamentoAtualProice";
      const CHAVE_CLIENTES = "clientesProice";
      const CHAVE_CLIENTES_BACKUP = "clientesProiceBackup";
      atualizarDatalist();

      const contatoInput = document.getElementById("empresaContato");
      if (contatoInput) {
        contatoInput.value = localStorage.getItem("contatoProice") || "";
        contatoInput.addEventListener("input", () => {
          localStorage.setItem("contatoProice", contatoInput.value.trim());
        });
      }

      function aplicarMascaraDocumento(input) {
        input.addEventListener("input", () => {
          let v = input.value.replace(/\D/g, "");
          if (v.length <= 11) {
            input.value = v.replace(/(\d{3})(\d)/, "$1.$2")
              .replace(/(\d{3})(\d)/, "$1.$2")
              .replace(/(\d{3})(\d{1,2})$/, "$1-$2");
          } else {
            input.value = v.replace(/^(\d{2})(\d)/, "$1.$2")
              .replace(/^(\d{2})\.(\d{3})(\d)/, "$1.$2.$3")
              .replace(/\.(\d{3})(\d)/, ".$1/$2")
              .replace(/(\d{4})(\d)/, "$1-$2");
          }
        });
      }

      function aplicarMascaraTelefone(input) {
        input.addEventListener("input", () => {
          let v = input.value.replace(/\D/g, "");
          if (v.length <= 10) {
            input.value = v.replace(/^(\d{2})(\d)/, "($1) $2")
              .replace(/(\d{4})(\d)/, "$1-$2");
          } else {
            input.value = v.replace(/^(\d{2})(\d)/, "($1) $2")
              .replace(/(\d{5})(\d)/, "$1-$2");
          }
        });
      }

      aplicarMascaraDocumento(cliDoc);
      aplicarMascaraTelefone(cliTelefone);

      function carregarClientes() {
        const principal = localStorage.getItem(CHAVE_CLIENTES);
        const backup = localStorage.getItem(CHAVE_CLIENTES_BACKUP);

        let clientes = [];
        try {
          clientes = JSON.parse(principal || "[]");
        } catch {
          clientes = [];
        }

        if ((!Array.isArray(clientes) || clientes.length === 0) && backup) {
          try {
            const clientesBackup = JSON.parse(backup || "[]");
            if (Array.isArray(clientesBackup)) {
              clientes = clientesBackup;
              localStorage.setItem(CHAVE_CLIENTES, JSON.stringify(clientesBackup));
            }
          } catch {
            clientes = [];
          }
        }

        return Array.isArray(clientes) ? clientes : [];
      }

      function salvarClientes(clientes) {
        const dados = JSON.stringify(clientes);
        localStorage.setItem(CHAVE_CLIENTES, dados);
        localStorage.setItem(CHAVE_CLIENTES_BACKUP, dados);
      }

      btnAcoes.onclick = e => {
        e.stopPropagation();
        menuAcoes.style.display = menuAcoes.style.display === "flex" ? "none" : "flex";
      };
      document.addEventListener("click", () => menuAcoes.style.display = "none");

      const abrir = e => e.style.display = "flex";
      const fechar = e => e.style.display = "none";

      btnCliente.onclick = () => abrir(overlayCliente);
      overlayCliente.onclick = e => { if (e.target === overlayCliente) fechar(overlayCliente); };

      btnConfirmarCliente.onclick = () => {
        if (!cliNome.value.trim()) {
          alert("Informe pelo menos o nome do cliente.");
          return;
        }

        const cliente = {
          id: Date.now().toString(36) + Math.random().toString(36).slice(2, 8),
          nome: cliNome.value,
          doc: cliDoc.value,
          endereco: cliEndereco.value,
          telefone: cliTelefone.value
        };

        vNome.innerText = cliente.nome;
        vDoc.innerText = cliente.doc;
        vEndereco.innerText = cliente.endereco;
        vTelefone.innerText = cliente.telefone;

        let clientes = carregarClientes();

        const docLimpo = (cliente.doc || "").trim();
        if (docLimpo) {
          clientes = clientes.filter(c => (c.doc || "").trim() !== docLimpo);
        } else {
          clientes = clientes.filter(c =>
            (c.nome || "").trim().toLowerCase() !== (cliente.nome || "").trim().toLowerCase() ||
            (c.telefone || "").trim() !== (cliente.telefone || "").trim()
          );
        }

        clientes.push(cliente);
        salvarClientes(clientes);
        salvarOrcamentoAtual();

        fechar(overlayCliente);
      };

      btnClientesSalvos.onclick = () => {
        listaClientes.innerHTML = "";
        let clientes = carregarClientes();
        let atualizouIds = false;

        clientes.forEach((c) => {
          if (!c.id) {
            c.id = Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
            atualizouIds = true;
          }
          const div = document.createElement("div");
          div.className = "cliente-salvo";
          div.innerHTML = `
            <div class="cliente-info">
              <strong>${c.nome}</strong><br>
              <small>${c.doc}</small>
            </div>
            <button class="btn-excluir">Excluir</button>
          `;

          div.querySelector(".cliente-info").onclick = () => {
            vNome.innerText = c.nome;
            vDoc.innerText = c.doc;
            vEndereco.innerText = c.endereco;
            vTelefone.innerText = c.telefone;
            salvarOrcamentoAtual();
            fechar(overlayClientesSalvos);
          };

          div.querySelector(".btn-excluir").onclick = () => {
            if (confirm("Excluir este cliente?")) {
              clientes = clientes.filter(x => x.id !== c.id);
              salvarClientes(clientes);
              btnClientesSalvos.click();
            }
          };

          listaClientes.appendChild(div);
        });

        if (atualizouIds) {
          salvarClientes(clientes);
        }

        abrir(overlayClientesSalvos);
      };
      overlayClientesSalvos.onclick = e => { if (e.target === overlayClientesSalvos) fechar(overlayClientesSalvos); };

      let totalValor = 0;
      const formatar = v => v.toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
      const obsInput = document.getElementById("obsPDF");

      function itensDaTabela() {
        const itensLista = [];
        document.querySelectorAll("#itens tr").forEach(tr => {
          const td = tr.querySelectorAll("td");
          if (td.length < 4) return;
          itensLista.push({
            descricao: td[0].innerText,
            qtd: td[1].innerText,
            valor: td[2].innerText,
            subtotal: td[3].innerText
          });
        });
        return itensLista;
      }

      function salvarOrcamentoAtual() {
        const dados = {
          cliente: {
            nome: vNome.innerText,
            doc: vDoc.innerText,
            endereco: vEndereco.innerText,
            telefone: vTelefone.innerText
          },
          pagamento: vPagamento.innerText,
          total: total.innerText,
          observacao: obsInput?.value || "",
          itens: itensDaTabela()
        };
        localStorage.setItem(CHAVE_ORCAMENTO_ATUAL, JSON.stringify(dados));
      }

      function carregarOrcamentoAtual() {
        const dados = JSON.parse(localStorage.getItem(CHAVE_ORCAMENTO_ATUAL) || "null");
        if (!dados) return;

        vNome.innerText = dados.cliente?.nome || "---";
        vDoc.innerText = dados.cliente?.doc || "---";
        vEndereco.innerText = dados.cliente?.endereco || "---";
        vTelefone.innerText = dados.cliente?.telefone || "---";
        vPagamento.innerText = dados.pagamento || "---";
        total.innerText = dados.total || "R$ 0,00";
        if (obsInput) obsInput.value = dados.observacao || "";

        itens.innerHTML = "";
        totalValor = 0;

        (dados.itens || []).forEach(item => {
          itens.innerHTML += `<tr><td>${item.descricao}</td><td>${item.qtd}</td><td>${item.valor}</td><td>${item.subtotal}</td></tr>`;
          const valorNum = Number(String(item.subtotal).replace(/[^\d,.-]/g, "").replace(/\./g, "").replace(",", "."));
          if (!Number.isNaN(valorNum)) totalValor += valorNum;
        });

        if ((!dados.total || dados.total === "R$ 0,00") && totalValor > 0) {
          total.innerText = formatar(totalValor);
        }
      }

      btnItens.onclick = () => abrir(overlayItens);
      overlayItens.onclick = e => { if (e.target === overlayItens) fechar(overlayItens); };

      btnAddItem.onclick = () => {
        const d = desc.value.trim(), q = +qtd.value, v = +valor.value;
        if (!d || q <= 0 || v <= 0) return;
        const s = q * v; totalValor += s;
        itens.innerHTML += `<tr><td>${d}</td><td>${q}</td><td>${formatar(v)}</td><td>${formatar(s)}</td></tr>`;
        total.innerText = formatar(totalValor);
        salvarDescricao(d);
        salvarOrcamentoAtual();
        desc.value = qtd.value = valor.value = "";
        fechar(overlayItens);
      };

      btnPagamento.onclick = () => abrir(overlayPagamento);
      overlayPagamento.onclick = e => { if (e.target === overlayPagamento) fechar(overlayPagamento); };

      overlayPagamento.querySelectorAll("button").forEach(b => {
        b.onclick = () => {
          vPagamento.innerText = b.dataset.pg;
          salvarOrcamentoAtual();
          fechar(overlayPagamento);
        };
      });

      btnNovo.onclick = () => {
        if (!confirm("Novo orcamento?")) return;
        itens.innerHTML = "";
        totalValor = 0;
        total.innerText = formatar(0);
        vNome.innerText = vDoc.innerText = vEndereco.innerText = vTelefone.innerText = "---";
        vPagamento.innerText = "---";
        if (obsInput) obsInput.value = "";
        localStorage.removeItem(CHAVE_ORCAMENTO_ATUAL);
      };

      if (obsInput) {
        obsInput.addEventListener("input", salvarOrcamentoAtual);
      }

      carregarOrcamentoAtual();
      window.addEventListener("beforeunload", salvarOrcamentoAtual);
    });

    function prepararPDF() {
      const dados = {
        nome: vNome.innerText,
        doc: vDoc.innerText,
        endereco: vEndereco.innerText,
        telefone: vTelefone.innerText,
        pagamento: vPagamento.innerText,
        total: total.innerText,
        observacao: document.getElementById("obsPDF")?.value || "",
        contatoEmpresa: localStorage.getItem("contatoProice") || "",
        itens: []
      };
      document.querySelectorAll("#itens tr").forEach(tr => {
        const td = tr.querySelectorAll("td");
        dados.itens.push({
          descricao: td[0].innerText,
          qtd: td[1].innerText,
          valor: td[2].innerText,
          subtotal: td[3].innerText
        });
      });

      const dadosStr = JSON.stringify(dados);
      sessionStorage.setItem("orcamentoPDF", dadosStr);
      localStorage.setItem("orcamentoPDF", dadosStr);
      window.open("pdf.html", "_blank");
    }

    function salvarDescricao(texto) {
      if (!texto) return;
      texto = texto.trim();
      let lista = JSON.parse(localStorage.getItem("descricoesProice")) || [];

      if (!lista.includes(texto)) {
        lista.push(texto);
        localStorage.setItem("descricoesProice", JSON.stringify(lista));
      }

      atualizarDatalist();
    }

    function atualizarDatalist() {
      const dl = document.getElementById("listaDescricoes");
      if (!dl) return;

      dl.innerHTML = "";
      let lista = JSON.parse(localStorage.getItem("descricoesProice")) || [];

      lista.forEach(desc => {
        const opt = document.createElement("option");
        opt.value = desc;
        dl.appendChild(opt);
      });
    }

    function gerarRecibo() {
      if (vNome.innerText === "---" || total.innerText === "R$ 0,00") {
        alert("Preencha cliente, pagamento e itens antes de gerar o recibo.");
        return;
      }

      if (vPagamento.innerText === "---") {
        alert("Selecione a forma de pagamento.");
        return;
      }

      const itens = [];
      document.querySelectorAll("#itens tr").forEach(tr => {
        const td = tr.querySelectorAll("td");
        itens.push({
          descricao: td[0].innerText,
          qtd: td[1].innerText,
          valor: td[2].innerText,
          subtotal: td[3].innerText
        });
      });

      const dadosRecibo = {
        nome: vNome.innerText,
        doc: vDoc.innerText,
        endereco: vEndereco.innerText,
        telefone: vTelefone.innerText,
        pagamento: vPagamento.innerText,
        total: total.innerText,
        observacao: document.getElementById("obsPDF")?.value || "",
        itens
      };

      const dadosStr = JSON.stringify(dadosRecibo);
      sessionStorage.setItem("reciboProice", dadosStr);
      localStorage.setItem("reciboProice", dadosStr);
      window.open("recibo.html", "_blank");
    }
  </script>
</body>

</html>
