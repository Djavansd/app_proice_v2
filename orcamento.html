<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orçamento | Proice</title>

    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0b3c6f">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root {
            --azul: #0b3c6f;
            --borda: #e5e7eb;
            --vermelho: #dc2626;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: #f5f7fa;
            color: #1f2937;
        }

        /* MENU */
        .menu {
            position: sticky;
            top: 0;
            background: var(--azul);
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 0 0 16px 16px;
        }

        .menu button {
            background: #fff;
            border: none;
            border-radius: 12px;
            padding: 8px 14px;
            font-weight: 600;
            cursor: pointer;
        }

        /* AÇÕES */
        .acoes-wrapper {
            position: relative;
        }

        .menu-acoes {
            position: absolute;
            top: 48px;
            right: 0;
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .25);
            padding: 8px;
            display: none;
            flex-direction: column;
            gap: 6px;
            z-index: 50;
        }

        .menu-acoes button {
            background: #f5f7fa;
            border: none;
            border-radius: 10px;
            padding: 10px 14px;
            text-align: left;
            font-weight: 600;
        }

        /* CARD */
        .card {
            max-width: 820px;
            margin: 30px auto;
            background: #fff;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .08);
        }

        /* CABEÇALHO */
        .cabecalho-orcamento {
            display: grid;
            grid-template-columns: auto 1fr;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
        }

        .cabecalho-texto {
            text-align: center;
        }

        .cabecalho-texto strong {
            display: block;
            font-size: 18px;
        }

        .cabecalho-texto small {
            font-size: 12px;
            color: #555;
        }

        /* TABELA */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
            font-size: 13px;
        }

        th,
        td {
            border: 1px solid var(--borda);
            padding: 8px;
        }

        th {
            background: #f0f4f8;
        }

        .total {
            text-align: right;
            font-size: 20px;
            font-weight: 700;
            margin-top: 14px;
        }

        .btnPdfFinal {
            margin-top: 18px;
            width: 100%;
            padding: 14px;
            background: var(--azul);
            color: #fff;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
        }

        /* MODAIS */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .modal {
            background: #fff;
            width: 90%;
            max-width: 420px;
            padding: 18px;
            border-radius: 16px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 10px;
            border: 1px solid var(--borda);
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: var(--azul);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-weight: 700;
        }

        /* CLIENTES SALVOS */
        .cliente-salvo {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #e5e7eb;
        }

        .cliente-info {
            cursor: pointer;
        }

        .btn-excluir {
            background: var(--vermelho);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <!-- MENU -->
    <div class="menu">
        <button onclick="location.href='index.html'">←</button>

        <div class="acoes-wrapper">
            <button id="btnAcoes">☰ Ações</button>
            <div id="menuAcoes" class="menu-acoes">
                <button id="btnNovo">🧹 Novo</button>
                <button id="btnCliente">👤 Cliente</button>
                <button id="btnClientesSalvos">📁 Clientes cadastrados</button>
                <button id="btnItens">➕ Item</button>
                <button id="btnPagamento">💳 Forma de pagamento</button>
            </div>
        </div>
    </div>

    <!-- MODAL CLIENTE -->
    <div id="overlayCliente" class="overlay">
        <div class="modal">
            <h3>Cliente</h3>
            <input id="cliNome" placeholder="Nome / Razão Social">
            <input id="cliDoc" placeholder="CPF ou CNPJ">
            <input id="cliEndereco" placeholder="Endereço">
            <input id="cliTelefone" placeholder="Telefone">
            <button class="btn" id="btnConfirmarCliente">Confirmar Cliente</button>
        </div>
    </div>

    <!-- MODAL CLIENTES SALVOS -->
    <div id="overlayClientesSalvos" class="overlay">
        <div class="modal">
            <h3>Clientes cadastrados</h3>
            <div id="listaClientes"></div>
        </div>
    </div>

    <!-- MODAL ITEM -->
    <div id="overlayItens" class="overlay">
        <div class="modal">
            <h3>Item</h3>
            <input id="desc" list="listaDescricoes" placeholder="Descrição">
            <datalist id="listaDescricoes"></datalist>
            <input id="qtd" type="number" placeholder="Quantidade">
            <input id="valor" type="number" placeholder="Valor unitário">
            <button class="btn" id="btnAddItem">Adicionar Item</button>
        </div>
    </div>

    <!-- MODAL PAGAMENTO -->
    <div id="overlayPagamento" class="overlay">
        <div class="modal">
            <h3>Forma de pagamento</h3>
            <button class="btn" data-pg="PIX">PIX</button>
            <button class="btn" data-pg="Débito">Débito</button>
            <button class="btn" data-pg="Crédito">Crédito</button>
            <button class="btn" data-pg="Boleto">Boleto</button>
        </div>
    </div>

    <!-- CONTEÚDO -->
    <div class="card">

        <div class="cabecalho-texto">
            <strong>PROICE CLIMATIZAÇÃO</strong>
            <small>CNPJ: 42.937.499/0001-08</small><br>
            <input id="empresaContato" placeholder="WhatsApp / Telefone da empresa" style="
            margin-top:6px;
            width:100%;
            max-width:260px;
            padding:6px 8px;
            font-size:12px;
            border-radius:8px;
            border:1px solid #e5e7eb;
        ">
        </div>


        <strong>CLIENTE:</strong> <span id="vNome">---</span><br>
        <strong>CPF/CNPJ:</strong> <span id="vDoc">---</span><br>
        <strong>ENDEREÇO:</strong> <span id="vEndereco">---</span><br>
        <strong>TELEFONE:</strong> <span id="vTelefone">---</span><br>
        <strong>PAGAMENTO:</strong> <span id="vPagamento">---</span>

        <table>
            <thead>
                <tr>
                    <th>DESCRIÇÃO</th>
                    <th>QTD</th>
                    <th>VALOR</th>
                    <th>SUBTOTAL</th>
                </tr>
            </thead>
            <tbody id="itens"></tbody>
        </table>

        <div class="total">TOTAL: <span id="total">R$ 0,00</span></div>
        <button class="btnPdfFinal" onclick="prepararPDF()">
            Visualizar / Imprimir PDF
        </button>
        <button class="btnPdfFinal" style="background:#059669;margin-top:10px"
    onclick="gerarRecibo()">
    🧾 Gerar Recibo
</button>

        <div style="margin-top:16px;">
            <strong>Observações:</strong>
            <textarea id="obsPDF" placeholder="Digite aqui alguma observação, prazo, garantia, condições..." style="
            width:100%;
            height:80px;
            margin-top:6px;
            padding:10px;
            border-radius:12px;
            border:1px solid #e5e7eb;
            font-family:inherit;
            font-size:14px;
            resize:none;
        "></textarea>
        </div>


    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            atualizarDatalist();
            /* ===== CONTATO DA EMPRESA (PROICE) ===== */
            const contatoInput = document.getElementById("empresaContato");

            if (contatoInput) {
                contatoInput.value = localStorage.getItem("contatoProice") || "";

                contatoInput.addEventListener("input", () => {
                    localStorage.setItem("contatoProice", contatoInput.value.trim());
                });
            }


            /* =========================
               PASSO 3 — MÁSCARAS BR (DEFINITIVO)
               ========================= */
            function aplicarMascaraDocumento(input) {
                input.addEventListener("input", () => {
                    let v = input.value.replace(/\D/g, "");
                    if (v.length <= 11) {
                        input.value = v.replace(/(\d{3})(\d)/, "$1.$2")
                            .replace(/(\d{3})(\d)/, "$1.$2")
                            .replace(/(\d{3})(\d{1,2})$/, "$1-$2");
                    } else {
                        input.value = v.replace(/^(\d{2})(\d)/, "$1.$2")
                            .replace(/^(\d{2})\.(\d{3})(\d)/, "$1.$2.$3")
                            .replace(/\.(\d{3})(\d)/, ".$1/$2")
                            .replace(/(\d{4})(\d)/, "$1-$2");
                    }
                });
            }

            function aplicarMascaraTelefone(input) {
                input.addEventListener("input", () => {
                    let v = input.value.replace(/\D/g, "");
                    if (v.length <= 10) {
                        input.value = v.replace(/^(\d{2})(\d)/, "($1) $2")
                            .replace(/(\d{4})(\d)/, "$1-$2");
                    } else {
                        input.value = v.replace(/^(\d{2})(\d)/, "($1) $2")
                            .replace(/(\d{5})(\d)/, "$1-$2");
                    }
                });
            }

            /* ATIVA UMA VEZ */
            aplicarMascaraDocumento(cliDoc);
            aplicarMascaraTelefone(cliTelefone);

            /* ===== RESTANTE DO APP (1,2,4,5,6) ===== */

            btnAcoes.onclick = e => {
                e.stopPropagation();
                menuAcoes.style.display = menuAcoes.style.display === "flex" ? "none" : "flex";
            };
            document.addEventListener("click", () => menuAcoes.style.display = "none");

            const abrir = e => e.style.display = "flex";
            const fechar = e => e.style.display = "none";

            /* CLIENTE */
            btnCliente.onclick = () => abrir(overlayCliente);
            overlayCliente.onclick = e => { if (e.target === overlayCliente) fechar(overlayCliente); };

            btnConfirmarCliente.onclick = () => {
                const cliente = {
                    nome: cliNome.value,
                    doc: cliDoc.value,
                    endereco: cliEndereco.value,
                    telefone: cliTelefone.value
                };

                vNome.innerText = cliente.nome;
                vDoc.innerText = cliente.doc;
                vEndereco.innerText = cliente.endereco;
                vTelefone.innerText = cliente.telefone;

                let clientes = JSON.parse(localStorage.getItem("clientesProice")) || [];
                clientes = clientes.filter(c => c.doc !== cliente.doc);
                clientes.push(cliente);
                localStorage.setItem("clientesProice", JSON.stringify(clientes));

                fechar(overlayCliente);
            };

            /* CLIENTES SALVOS + EXCLUIR */
            btnClientesSalvos.onclick = () => {
                listaClientes.innerHTML = "";
                let clientes = JSON.parse(localStorage.getItem("clientesProice")) || [];

                clientes.forEach((c, i) => {
                    const div = document.createElement("div");
                    div.className = "cliente-salvo";

                    div.innerHTML = `
      <div class="cliente-info">
        <strong>${c.nome}</strong><br>
        <small>${c.doc}</small>
      </div>
      <button class="btn-excluir">Excluir</button>
    `;

                    div.querySelector(".cliente-info").onclick = () => {
                        vNome.innerText = c.nome;
                        vDoc.innerText = c.doc;
                        vEndereco.innerText = c.endereco;
                        vTelefone.innerText = c.telefone;
                        fechar(overlayClientesSalvos);
                    };

                    div.querySelector(".btn-excluir").onclick = () => {
                        if (confirm("Excluir este cliente?")) {
                            clientes.splice(i, 1);
                            localStorage.setItem("clientesProice", JSON.stringify(clientes));
                            btnClientesSalvos.click();
                        }
                    };

                    listaClientes.appendChild(div);
                });

                abrir(overlayClientesSalvos);
            };
            overlayClientesSalvos.onclick = e => { if (e.target === overlayClientesSalvos) fechar(overlayClientesSalvos); };

            /* ITEM */
            let totalValor = 0;
            const formatar = v => v.toLocaleString("pt-BR", { style: "currency", currency: "BRL" });

            btnItens.onclick = () => abrir(overlayItens);
            overlayItens.onclick = e => { if (e.target === overlayItens) fechar(overlayItens); };

            btnAddItem.onclick = () => {
                const d = desc.value.trim(), q = +qtd.value, v = +valor.value;
                if (!d || q <= 0 || v <= 0) return;
                const s = q * v; totalValor += s;
                itens.innerHTML += `<tr><td>${d}</td><td>${q}</td><td>${formatar(v)}</td><td>${formatar(s)}</td></tr>`;
                total.innerText = formatar(totalValor);
                salvarDescricao(d); // 👈 AQUI
                desc.value = qtd.value = valor.value = "";
                fechar(overlayItens);
            };

            /* PAGAMENTO */
            btnPagamento.onclick = () => abrir(overlayPagamento);
            overlayPagamento.onclick = e => { if (e.target === overlayPagamento) fechar(overlayPagamento); };

            overlayPagamento.querySelectorAll("button").forEach(b => {
                b.onclick = () => {
                    vPagamento.innerText = b.dataset.pg;
                    fechar(overlayPagamento);
                };
            });

            /* NOVO */
            btnNovo.onclick = () => {
                if (!confirm("Novo orçamento?")) return;
                itens.innerHTML = "";
                totalValor = 0;
                total.innerText = formatar(0);
                vNome.innerText = vDoc.innerText = vEndereco.innerText = vTelefone.innerText = "---";
                vPagamento.innerText = "---";
            };

        });

    </script>
    <script>
        function prepararPDF() {
            const dados = {
                nome: vNome.innerText,
                doc: vDoc.innerText,
                endereco: vEndereco.innerText,
                telefone: vTelefone.innerText,
                pagamento: vPagamento.innerText,
                total: total.innerText,
                observacao: document.getElementById("obsPDF")?.value || "",
                contatoEmpresa: localStorage.getItem("contatoProice") || "",
                itens: []
            };
            document.querySelectorAll("#itens tr").forEach(tr => {
                const td = tr.querySelectorAll("td");
                dados.itens.push({
                    descricao: td[0].innerText,
                    qtd: td[1].innerText,
                    valor: td[2].innerText,
                    subtotal: td[3].innerText
                });
            });

            sessionStorage.setItem("orcamentoPDF", JSON.stringify(dados));
            window.open("pdf.html", "_blank");
        }
        /* =========================
   PASSO 10 — MEMÓRIA DA DESCRIÇÃO
   ========================= */

        function salvarDescricao(texto) {
            if (!texto) return;

            texto = texto.trim();
            let lista = JSON.parse(localStorage.getItem("descricoesProice")) || [];

            if (!lista.includes(texto)) {
                lista.push(texto);
                localStorage.setItem("descricoesProice", JSON.stringify(lista));
            }

            atualizarDatalist();
        }

        function atualizarDatalist() {
            const dl = document.getElementById("listaDescricoes");
            if (!dl) return;

            dl.innerHTML = "";
            let lista = JSON.parse(localStorage.getItem("descricoesProice")) || [];

            lista.forEach(desc => {
                const opt = document.createElement("option");
                opt.value = desc;
                dl.appendChild(opt);
            });
        }
    </script>

<script>
function gerarRecibo() {

  // validação mínima
  if (vNome.innerText === "---" || total.innerText === "R$ 0,00") {
    alert("Preencha cliente, pagamento e itens antes de gerar o recibo.");
    return;
  }

  if (vPagamento.innerText === "---") {
    alert("Selecione a forma de pagamento.");
    return;
  }

  // coleta TODOS os itens diretamente da tabela
  const itens = [];
  document.querySelectorAll("#itens tr").forEach(tr => {
    const td = tr.querySelectorAll("td");
    itens.push({
      descricao: td[0].innerText,
      qtd: td[1].innerText,
      valor: td[2].innerText,
      subtotal: td[3].innerText
    });
  });

  // objeto FINAL do recibo (estado REAL da tela)
  const dadosRecibo = {
    nome: vNome.innerText,
    doc: vDoc.innerText,
    endereco: vEndereco.innerText,
    telefone: vTelefone.innerText,
    pagamento: vPagamento.innerText,
    total: total.innerText,
    observacao: document.getElementById("obsPDF")?.value || "",
    itens: itens
  };

  // salva SOMENTE para o recibo
  sessionStorage.setItem("reciboProice", JSON.stringify(dadosRecibo));

  // abre o recibo
  window.open("recibo.html", "_blank");
}
</script>



</body>

</html>
