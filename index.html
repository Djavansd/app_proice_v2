<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gastos Proice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="manifest" href="/manifest.json?v=8">
  <meta name="theme-color" content="#0f3a66">
  <link rel="stylesheet" href="styles.css?v=8">
</head>

<body class="escuro">
  <div class="home-shell">
    <div class="topo">
      <h2>PROICE CLIMATIZACAO</h2>
      <button id="btnTema" aria-label="Alternar tema"></button>
    </div>

    <input id="descricao" list="descricoesSalvas" placeholder="Descricao">
    <datalist id="descricoesSalvas"></datalist>
    <input id="valor" type="text" inputmode="decimal" placeholder="Valor">

    <button class="btn btn-verde" id="btnSalvar">Salvar gasto</button>
    <button class="btn btn-azul" id="btnPdf">Visualizar e enviar PDF</button>

    <div class="total" id="total">Total: R$ 0,00</div>

    <div class="nav-acoes">
      <div class="nav-btn" onclick="window.location.href='orcamento.html'">
        <span>O</span> Orcamento
      </div>
      <div class="nav-btn" onclick="window.location.href='relatorio.html'">
        <span>H</span> Historico
      </div>
    </div>

    <div id="lista"></div>
  </div>

  <script>
    const body = document.body;
    const btnTema = document.getElementById("btnTema");
    const iconeLua = `
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 1 0 9.8 9.8Z" fill="currentColor"></path>
      </svg>
    `;
    const iconeSol = `
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="12" cy="12" r="4.2" fill="currentColor"></circle>
        <g stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
          <line x1="12" y1="2.5" x2="12" y2="5"></line>
          <line x1="12" y1="19" x2="12" y2="21.5"></line>
          <line x1="2.5" y1="12" x2="5" y2="12"></line>
          <line x1="19" y1="12" x2="21.5" y2="12"></line>
          <line x1="5.3" y1="5.3" x2="7.1" y2="7.1"></line>
          <line x1="16.9" y1="16.9" x2="18.7" y2="18.7"></line>
          <line x1="16.9" y1="7.1" x2="18.7" y2="5.3"></line>
          <line x1="5.3" y1="18.7" x2="7.1" y2="16.9"></line>
        </g>
      </svg>
    `;

    function aplicarTema(nome) {
      body.className = nome;
      btnTema.innerHTML = nome === "escuro" ? iconeSol : iconeLua;
      localStorage.setItem("tema", nome);
    }

    aplicarTema(localStorage.getItem("tema") || "escuro");
    btnTema.onclick = () => {
      aplicarTema(body.className === "escuro" ? "claro" : "escuro");
    };
  </script>
  <script>
    if ("serviceWorker" in navigator) {
      const APP_VERSION = "2026.02.23.8";
      const APP_VERSION_KEY = "__proice_app_version__";
      let jaRecarregouPorSW = false;

      const pedirAtivacao = (reg) => {
        if (reg && reg.waiting) {
          reg.waiting.postMessage({ type: "SKIP_WAITING" });
        }
      };

      const migrarVersaoSeNecessario = async () => {
        const versaoAtual = localStorage.getItem(APP_VERSION_KEY);
        if (versaoAtual === APP_VERSION) return false;

        const regs = await navigator.serviceWorker.getRegistrations();
        await Promise.all(regs.map((r) => r.unregister()));

        if (window.caches && caches.keys) {
          const chaves = await caches.keys();
          await Promise.all(chaves.map((k) => caches.delete(k)));
        }

        localStorage.setItem(APP_VERSION_KEY, APP_VERSION);
        return true;
      };

      window.addEventListener("load", async () => {
        try {
          const migrou = await migrarVersaoSeNecessario();
          if (migrou) {
            window.location.replace("./index.html?v=8");
            return;
          }

          const reg = await navigator.serviceWorker.register("./service-worker.js?v=8", { updateViaCache: "none" });
          pedirAtivacao(reg);

          reg.addEventListener("updatefound", () => {
            const novoWorker = reg.installing;
            if (!novoWorker) return;

            novoWorker.addEventListener("statechange", () => {
              if (novoWorker.state === "installed" && navigator.serviceWorker.controller) {
                pedirAtivacao(reg);
              }
            });
          });

          setInterval(() => reg.update(), 30 * 1000);
        } catch {
          // sem acao
        }
      });

      navigator.serviceWorker.addEventListener("controllerchange", () => {
        if (jaRecarregouPorSW) return;
        jaRecarregouPorSW = true;
        window.location.reload();
      });
    }
  </script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js?v=8"></script>
  <script src="firebase-financeiro.js?v=8"></script>
  <script src="app.js?v=8"></script>
</body>

</html>
