<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gastos Proice</title>

  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0b3c6f">

  <style>
    :root {
      --azul: #0b3c6f;
      --azul-escuro: #082f57;
      --verde: #2ecc71;
      --azul-botao: #1e88e5;
      --branco: #ffffff;
      --cinza: #e5e7eb;
      --bg: #0b3c6f;
      --card: #ffffff;
      --texto: #ffffff;
    }

    /* ===== TEMA ESCURO / CLARO ===== */
    body.claro {
      --bg: #eef1f4;
      --texto: #1f2937;
      background: #eef1f4;
    }

    body.escuro {
      background: linear-gradient(180deg, #0b3c6f, #082f57);
    }

    /* BASE */
    body {
      margin: 0;
      font-family: "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--texto);
    }

    .container {
      max-width: 420px;
      margin: auto;
      padding: 22px;
    }

    /* TOPO */
    .topo {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 22px;
    }

    .topo h2 {
      margin: 0;
      font-weight: 700;
    }

    /* BOTÃO TEMA */
    #btnTema {
      border: none;
      background: #ffffff;
      border-radius: 50%;
      width: 38px;
      height: 38px;
      font-size: 18px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0, 0, 0, .25);
    }

    /* INPUTS */
    input {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, .25);
      background: rgba(0, 0, 0, .25);
      color: #fff;
      margin-bottom: 14px;
    }

    body.claro input {
      background: #fff;
      color: #111;
      border: 1px solid #d1d5db;
    }

    /* BOTÕES */
    .btn {
      width: 100%;
      padding: 14px;
      border-radius: 22px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 14px;
      box-shadow: 0 6px 14px rgba(0, 0, 0, .3);
      transition: transform .1s ease, box-shadow .1s ease;
    }

    .btn:active {
      transform: translateY(2px);
      box-shadow: inset 0 3px 6px rgba(0, 0, 0, .35), 0 2px 6px rgba(0, 0, 0, .25);
    }

    .btn-verde {
      background: var(--verde);
      color: #0b2e1a;
    }

    .btn-azul {
      background: var(--azul-botao);
      color: #fff;
    }

    /* TOTAL */
    .total {
      text-align: center;
      margin: 18px 0 24px;
      font-size: 18px;
      font-weight: 700;
    }

    /* NAVEGAÇÃO */
    .nav-acoes {
      margin-top: 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .nav-btn {
      background: #ffffff;
      color: var(--azul);
      padding: 16px;
      border-radius: 18px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 6px 16px rgba(0, 0, 0, .25);
      cursor: pointer;
      transition: transform .1s ease, box-shadow .1s ease;
    }

    .nav-btn:active {
      transform: translateY(2px);
      box-shadow: inset 0 3px 6px rgba(0, 0, 0, .25);
    }

    .nav-btn span {
      font-size: 20px;
    }

    /* LISTA */
    .item {
      margin-top: 8px;
      padding: 16px;
      border-radius: 16px;
      background: rgba(255, 255, 255, .1);
      border: 1px solid rgba(255, 255, 255, .2);
    }

    /* =========================
   SEPARAÇÃO REAL ENTRE HISTÓRICO E LISTA
   ========================= */

    #lista {
      padding-top: 28px;
    }
  </style>
</head>

<body class="escuro">

  <div class="container">

    <!-- TOPO -->
    <div class="topo">
      <h2>PROICE CLIMATIZAÇÃO</h2>
      <button id="btnTema">🌙</button>
    </div>

    <!-- CAMPOS -->
    <input id="descricao" placeholder="Descrição">
    <input id="valor" type="number" placeholder="Valor">

    <!-- BOTÕES -->
    <button class="btn btn-verde" id="btnSalvar">
      💾 Salvar gasto
    </button>

    <button class="btn btn-azul" id="btnPdf">
      📄 Visualizar e Enviar PDF
    </button>

    <!-- TOTAL -->
    <div class="total" id="total">
      Total: R$ 0,00
    </div>

    <!-- NAVEGAÇÃO -->
    <div class="nav-acoes">
      <div class="nav-btn" onclick="window.location.href='orcamento.html'">
        <span>📄</span> Orçamento
      </div>

      <div class="nav-btn" onclick="window.location.href='relatorio.html'">
        <span>📂</span> Histórico
      </div>
    </div>

    <!-- LISTA -->
    <div id="lista"></div>

  </div>

  <script>
    /* ===== TEMA CLARO / ESCURO ===== */
    const body = document.body;
    const btnTema = document.getElementById("btnTema");

    function aplicarTema(nome) {
      body.className = nome;
      btnTema.innerText = nome === "escuro" ? "☀️" : "🌙";
      localStorage.setItem("tema", nome);
    }

    aplicarTema(localStorage.getItem("tema") || "escuro");

    btnTema.onclick = () => {
      aplicarTema(body.className === "escuro" ? "claro" : "escuro");
    };
  </script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="app.js"></script>

</body>

</html>
